[package]
name = "pixa_core"
version = "0.1.0"
edition.workspace = true
license.workspace = true
repository.workspace = true

[lib]
name = "pixa_core"
path = "src/lib.rs"

[dependencies]
bytes = "1.12.0"
hmac = "0.13.0"
http = "1.4.2"
http-body-util = "0.1.3"
hyper = { version = "1.10.1", features = ["client", "http1", "http2"] }
hyper-rustls = { version = "0.27.9", default-features = false, features = ["http1", "http2", "ring", "rustls-native-certs", "tls12", "webpki-roots"] }
hyper-util = { version = "0.1.20", features = ["client", "client-legacy", "client-proxy", "http1", "http2", "tokio"] }
image = { version = "0.25.10", default-features = false, features = ["bmp", "dds", "ff", "gif", "hdr", "ico", "jpeg", "png", "pnm", "qoi", "tga", "tiff", "webp"] }
image-extras = { version = "0.1.1", default-features = false, features = ["pcx", "sgi", "wbmp", "xbm", "xpm"] }
png = "0.18.1"
sha2 = "0.11.0"
tokio = { version = "1.52.3", features = ["macros", "rt-multi-thread", "sync", "time"] }
tower-service = "0.3.3"

[dev-dependencies]
rcgen = { version = "0.14.8", default-features = false, features = ["ring"] }
rustls = { version = "0.23.41", default-features = false, features = ["ring", "std", "tls12"] }

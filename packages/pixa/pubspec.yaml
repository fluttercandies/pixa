name: pixa
description: Production-oriented Flutter image loading, caching, and pipeline primitives.
version: 1.0.0
repository: https://github.com/fluttercandies/pixa
resolution: workspace

platforms:
  android:
  ios:
  linux:
  macos:
  windows:

environment:
  sdk: ">=3.11.0 <4.0.0"
  flutter: ">=3.41.9"

dependencies:
  code_assets: ^1.2.1
  ffi: ^2.2.0
  flutter:
    sdk: flutter
  hooks: ^2.0.2
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ">=5.0.0 <7.0.0"

flutter:
  plugin:
    platforms:
      ios:
        pluginClass: PixaPlugin
      macos:
        pluginClass: PixaPlugin
  assets: []

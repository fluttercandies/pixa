name: pixa_gallery
description: Runtime acceptance gallery for the Pixa image loading package.
publish_to: none

environment:
  sdk: ">=3.11.0 <4.0.0"
  flutter: ">=3.41.9"

dependencies:
  flexbox_layout: ^3.1.0
  flutter:
    sdk: flutter
  path_provider: ^2.1.0
  pixa:
    path: ../../packages/pixa

dev_dependencies:
  cockpit: ^1.1.3
  flutter_cockpit: ^1.1.3
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/pixa_sample.ppm

name: Pixa CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: pixa-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  flutter-minimum:
    name: Flutter 3.41 Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          channel: stable
          flutter-version: "3.41.9"
          cache: true
      - name: Install Rust 1.89.0
        run: |
          rustup toolchain install 1.89.0 --profile minimal --component clippy --component rustfmt
          rustup default 1.89.0
      - name: Install cargo-audit
        run: cargo install cargo-audit --version 0.22.2 --locked
      - name: Install root dependencies
        run: dart pub get
      - name: Guard
        run: dart run tool/pixa_guard.dart
      - name: Platform build wrapper self-test
        run: dart run tool/pixa_platform_build_self_test.dart
      - name: Gallery cockpit wrapper self-test
        run: dart run tool/pixa_gallery_cockpit_acceptance_self_test.dart
      - name: Analyze core packages
        run: dart analyze packages/pixa packages/pixa_fetcher_s3 tool
      - name: Test core package
        working-directory: packages/pixa
        run: flutter test --concurrency=1

  flutter-stable:
    name: Flutter stable ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: macos-latest
            platform: macos
          - os: windows-latest
            platform: windows
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          channel: stable
          cache: true
      - name: Install Rust 1.89.0
        shell: bash
        run: |
          rustup toolchain install 1.89.0 --profile minimal --component clippy --component rustfmt
          rustup default 1.89.0
      - name: Install cargo-audit
        shell: bash
        run: cargo install cargo-audit --version 0.22.2 --locked
      - name: Install Melos
        run: dart pub global activate melos 8.2.2
      - name: Add Pub cache bin
        shell: bash
        run: |
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            echo "$LOCALAPPDATA/Pub/Cache/bin" >> "$GITHUB_PATH"
          else
            echo "$HOME/.pub-cache/bin" >> "$GITHUB_PATH"
          fi
      - name: Bootstrap
        run: melos bootstrap
      - name: Guard
        run: melos run guard
      - name: Analyze
        run: melos run analyze
      - name: Test
        run: melos run test
      - name: Platform self-check
        run: dart run tool/pixa_platform_self_check.dart --output=build/reports/pixa_platform_self_check_${{ matrix.platform }}.json
      - name: Upload platform self-check
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: pixa-platform-self-check-${{ matrix.platform }}
          path: build/reports/pixa_platform_self_check_${{ matrix.platform }}.json

  rust:
    name: Rust 1.89.0
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Install Rust 1.89.0
        run: |
          rustup toolchain install 1.89.0 --profile minimal --component clippy --component rustfmt
          rustup default 1.89.0
      - name: Install cargo-audit
        run: cargo install cargo-audit --version 0.22.2 --locked
      - name: Format
        run: cargo fmt --manifest-path packages/pixa/native_src/rust/Cargo.toml --all --check
      - name: Clippy
        run: cargo clippy --manifest-path packages/pixa/native_src/rust/Cargo.toml --target-dir build/rust-target --all-targets --all-features -- -D warnings
      - name: Audit
        run: cargo audit -f packages/pixa/native_src/rust/Cargo.lock -D warnings
      - name: Test
        run: cargo test --manifest-path packages/pixa/native_src/rust/Cargo.toml --target-dir build/rust-target --all

  platform-evidence:
    name: Platform evidence
    runs-on: ubuntu-latest
    needs:
      - flutter-stable
      - platform-build
      - android-cockpit
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          channel: stable
          cache: true
      - name: Install root dependencies
        run: dart pub get
      - name: Download platform self-check reports
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: pixa-platform*check-*
          path: build/reports
          merge-multiple: true
      - name: Self-test platform evidence verifier
        run: dart run tool/pixa_platform_evidence_self_test.dart
      - name: Validate hosted platform evidence
        run: >-
          dart run tool/pixa_platform_evidence.dart
          --require-platforms=android,ios,linux,macos,windows
          --require-run-mode=integration-test
          --require-native-modules=jpeg-turbo-roi,webp-roi
          --require-git-commit=${{ github.sha }}

  android-cockpit:
    name: Android gallery Cockpit
    runs-on: ubuntu-latest
    env:
      PIXA_ANDROID_COCKPIT_LAUNCH_ID: pixa-android-cockpit-ci
      PIXA_ANDROID_COCKPIT_PREBUILT_APK: examples/pixa_gallery/build/app/outputs/flutter-apk/app-debug.apk
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          channel: stable
          cache: true
      - name: Install Rust 1.89.0
        shell: bash
        run: |
          rustup toolchain install 1.89.0 --profile minimal
          rustup default 1.89.0
          rustup target add x86_64-linux-android --toolchain 1.89.0
      - name: Install Android native build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build nasm pkg-config
      - uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407 # v3
      - name: Install Android NDK
        shell: bash
        run: |
          sdkmanager "ndk;27.0.12077973" "platforms;android-36" "build-tools;36.0.0"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/27.0.12077973" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_ROOT=$ANDROID_HOME/ndk/27.0.12077973" >> "$GITHUB_ENV"
      - name: Install root dependencies
        run: dart pub get
      - name: Prebuild Android gallery Cockpit APK
        shell: bash
        run: bash tool/pixa_android_cockpit_prebuild_ci.sh
      - name: Enable Android emulator KVM acceleration
        shell: bash
        run: |
          if [[ -e /dev/kvm ]]; then
            echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
            sudo udevadm control --reload-rules
            sudo udevadm trigger --name-match=kvm
            sudo chmod 666 /dev/kvm
            ls -l /dev/kvm
          else
            echo "/dev/kvm is not available; Android emulator will use software acceleration."
          fi
      - name: Build and run Android Cockpit acceptance
        uses: reactivecircus/android-emulator-runner@a421e43855164a8197daf9d8d40fe71c6996bb0d # v2
        with:
          api-level: 35
          arch: x86_64
          target: google_apis
          profile: pixel_2
          ram-size: 4096M
          heap-size: 512M
          emulator-boot-timeout: 2700
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim -camera-back none -memory 4096
          script: bash tool/pixa_android_cockpit_ci.sh
      - name: Upload Android gallery Cockpit acceptance
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: pixa-gallery-cockpit-android
          path: build/reports/pixa_gallery_cockpit_android

  platform-build:
    name: Platform build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: android
            os: ubuntu-latest
            rust-targets: aarch64-linux-android armv7-linux-androideabi x86_64-linux-android i686-linux-android
          - platform: ios
            os: macos-latest
            rust-targets: aarch64-apple-ios aarch64-apple-ios-sim x86_64-apple-ios
          - platform: linux
            os: ubuntu-latest
            rust-targets: x86_64-unknown-linux-gnu
          - platform: macos
            os: macos-latest
            rust-targets: aarch64-apple-darwin x86_64-apple-darwin
          - platform: windows
            os: windows-latest
            rust-targets: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          channel: stable
          cache: true
      - name: Install Rust 1.89.0
        shell: bash
        run: |
          rustup toolchain install 1.89.0 --profile minimal --component clippy --component rustfmt
          rustup default 1.89.0
          rustup target add ${{ matrix.rust-targets }} --toolchain 1.89.0
      - name: Install Linux build dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends clang cmake ninja-build nasm pkg-config libgtk-3-dev liblzma-dev xvfb x11-utils libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev gstreamer1.0-libav
      - name: Install Android native ROI build dependencies
        if: matrix.platform == 'android'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build nasm pkg-config
      - name: Install macOS native ROI build dependencies
        if: matrix.platform == 'macos'
        run: brew install nasm
      - name: Install Windows native ROI build dependencies
        if: matrix.platform == 'windows'
        shell: pwsh
        run: choco install nasm -y
      - uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407 # v3
        if: matrix.platform == 'android'
      - name: Install Android NDK
        if: matrix.platform == 'android'
        shell: bash
        run: |
          sdkmanager "ndk;27.0.12077973" "platforms;android-36" "build-tools;36.0.0"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/27.0.12077973" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_ROOT=$ANDROID_HOME/ndk/27.0.12077973" >> "$GITHUB_ENV"
      - name: Install root dependencies
        run: dart pub get
      - name: Enable Android emulator KVM acceleration
        if: matrix.platform == 'android'
        shell: bash
        run: |
          if [[ -e /dev/kvm ]]; then
            echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
            sudo udevadm control --reload-rules
            sudo udevadm trigger --name-match=kvm
            sudo chmod 666 /dev/kvm
            ls -l /dev/kvm
          else
            echo "/dev/kvm is not available; Android emulator will use software acceleration."
          fi
      - name: Enable Swift Package Manager
        if: matrix.platform == 'ios' || matrix.platform == 'macos'
        run: flutter config --enable-swift-package-manager
      - name: Build and run Android platform acceptance
        if: matrix.platform == 'android'
        uses: reactivecircus/android-emulator-runner@a421e43855164a8197daf9d8d40fe71c6996bb0d # v2
        with:
          api-level: 35
          arch: x86_64
          target: google_apis_ps16k
          profile: pixel_2
          ram-size: 2048M
          heap-size: 512M
          emulator-boot-timeout: 2700
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim -camera-back none
          script: bash tool/pixa_android_platform_ci.sh
      - name: Boot iOS simulator
        if: matrix.platform == 'ios'
        shell: bash
        run: |
          set -euo pipefail
          device_name="$(xcrun simctl list devices available | awk -F '[()]' '/iPhone/ && /Shutdown/ {gsub(/^[ \t]+|[ \t]+$/, "", $1); print $1; exit}')"
          if [[ -z "$device_name" ]]; then
            device_name="$(xcrun simctl list devices available | awk -F '[()]' '/iPhone/ {gsub(/^[ \t]+|[ \t]+$/, "", $1); print $1; exit}')"
          fi
          if [[ -z "$device_name" ]]; then
            echo "No available iOS simulator device found." >&2
            xcrun simctl list devices available >&2
            exit 1
          fi
          xcrun simctl boot "$device_name" || true
          xcrun simctl bootstatus booted -b
          device_id="$(xcrun simctl list devices booted | awk -F '[()]' '/Booted/ {print $2; exit}')"
          if [[ -z "$device_id" ]]; then
            echo "No booted iOS simulator id found." >&2
            xcrun simctl list devices booted >&2
            exit 1
          fi
          echo "PIXA_IOS_SIMULATOR_ID=$device_id" >> "$GITHUB_ENV"
      - name: Build and run iOS simulator platform probe
        if: matrix.platform == 'ios'
        run: dart run tool/pixa_platform_build.dart --platform=ios --enable-native-roi --run-self-check --device=${{ env.PIXA_IOS_SIMULATOR_ID }} --device-kind=simulator --connection=local --signing=debug --report-output=build/reports/pixa_platform_probe_self_check_ios.json
      - name: Run iOS simulator gallery cockpit acceptance
        if: matrix.platform == 'ios'
        run: dart run tool/pixa_gallery_cockpit_acceptance.dart --platform=ios --device-id=${{ env.PIXA_IOS_SIMULATOR_ID }} --output-root=build/reports/pixa_gallery_cockpit_ios
      - name: Build and run Linux platform probe
        if: matrix.platform == 'linux'
        run: xvfb-run -a dart run tool/pixa_platform_build.dart --platform=linux --enable-native-roi --run-self-check --report-output=build/reports/pixa_platform_probe_self_check_linux.json --device-kind=desktop --connection=local --signing=not-applicable
      - name: Run Linux gallery cockpit acceptance
        if: matrix.platform == 'linux'
        run: xvfb-run -a dart run tool/pixa_gallery_cockpit_acceptance.dart --platform=linux --device-id=linux --output-root=build/reports/pixa_gallery_cockpit_linux
      - name: Build and run desktop platform probe
        if: matrix.platform == 'macos' || matrix.platform == 'windows'
        run: dart run tool/pixa_platform_build.dart --platform=${{ matrix.platform }} --enable-native-roi --run-self-check --report-output=build/reports/pixa_platform_probe_self_check_${{ matrix.platform }}.json --device-kind=desktop --connection=local --signing=not-applicable
      - name: Run desktop gallery cockpit acceptance
        if: matrix.platform == 'macos' || matrix.platform == 'windows'
        run: dart run tool/pixa_gallery_cockpit_acceptance.dart --platform=${{ matrix.platform }} --device-id=${{ matrix.platform }} --output-root=build/reports/pixa_gallery_cockpit_${{ matrix.platform }}
      - name: Upload desktop platform probe self-check
        if: always() && (matrix.platform == 'linux' || matrix.platform == 'macos' || matrix.platform == 'windows')
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: pixa-platform-probe-self-check-${{ matrix.platform }}
          path: build/reports/pixa_platform_probe_self_check_${{ matrix.platform }}.json
      - name: Upload mobile platform probe self-check
        if: always() && (matrix.platform == 'android' || matrix.platform == 'ios')
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: pixa-platform-probe-self-check-${{ matrix.platform }}
          path: build/reports/pixa_platform_probe_self_check_${{ matrix.platform }}.json
      - name: Upload gallery cockpit acceptance
        if: always() && matrix.platform != 'android'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: pixa-gallery-cockpit-${{ matrix.platform }}
          path: build/reports/pixa_gallery_cockpit_${{ matrix.platform }}
